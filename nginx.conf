# 替身 (Shuangshen) — Nginx 反向代理 + HTTPS
# 部署位置：/etc/nginx/sites-available/shuangshen
# 软链到 /etc/nginx/sites-enabled/shuangshen

# HTTP → 强制跳转 HTTPS
server {
    listen 80;
    server_name app.mianmianlife.com;

    # Certbot 证书续签验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl;
    server_name app.mianmianlife.com;

    # Let's Encrypt 证书（certbot 申请后自动写入此路径）
    ssl_certificate     /etc/letsencrypt/live/app.mianmianlife.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.mianmianlife.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # 文件上传大小（与 .env MAX_CONTENT_LENGTH_MB 一致）
    client_max_body_size 50M;

    # 反向代理到 Docker 容器（Flask gunicorn 跑在 5000 端口）
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
